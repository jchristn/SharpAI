server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # Aggressively cache hashed Vite build assets (filenames contain content hashes).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: serve index.html for any client-side route that doesn't match a file.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic gzip compression for text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;
}
