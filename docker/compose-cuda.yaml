services:

  #
  # SharpAI Server (CUDA / NVIDIA GPU)
  # Requires the NVIDIA Container Toolkit on the host:
  # https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
  #
  # See https://hub.docker.com/r/jchristn77/sharpai
  # and https://github.com/jchristn/sharpai
  #
  sharpai:
    container_name: 'sharpai'
    image: 'jchristn77/sharpai:v4.0.0'
    ports:
      - '8000:8000'
    stdin_open: true
    tty: true
    volumes:
      - ./sharpai.json:/app/sharpai.json
      - ./sharpai.db:/app/sharpai.db
      - ./logs/:/app/logs/
      - ./models/:/app/models/
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: curl --fail http://localhost:8000
    restart: unless-stopped

  #
  # SharpAI Dashboard
  # See https://hub.docker.com/r/jchristn77/sharpai-ui
  #
  sharpai-ui:
    container_name: 'sharpai-ui'
    image: 'jchristn77/sharpai-ui:v4.0.0'
    ports:
      - '3000:3000'
    depends_on:
      - sharpai
    restart: unless-stopped
