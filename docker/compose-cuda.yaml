services:

  #
  # SharpAI Server (CUDA / NVIDIA GPU)
  # Requires the NVIDIA Container Toolkit on the host:
  # https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
  #
  # See https://hub.docker.com/r/jchristn77/sharpai
  # and https://github.com/jchristn/sharpai
  #
  sharpai:
    container_name: 'sharpai'
    image: 'jchristn77/sharpai:v4.0.0'
    ports:
      - '8000:8000'
    stdin_open: true
    tty: true
    volumes:
      - ./sharpai.json:/app/sharpai.json
      - ./sharpai.db:/app/sharpai.db
      - ./logs/:/app/logs/
      - ./models/:/app/models/
    environment:
      DOTNET_GC_SERVER: "1"
      SHARPAI_FORCE_BACKEND: "cuda"
      SHARPAI_CPU_VARIANT: "auto"
      SHARPAI_REQUIRE_BACKEND: "true"
      SHARPAI_ENABLE_NATIVE_LOGGING: "false"
      SHARPAI_NUM_THREADS: "0"
      SHARPAI_BATCH_THREADS: "0"
      SHARPAI_GPU_LAYERS: "auto"
      SHARPAI_MAIN_GPU: "0"
      SHARPAI_CONTEXT_SIZE: "0"
      SHARPAI_BATCH_SIZE: "0"
      SHARPAI_UBATCH_SIZE: "0"
      SHARPAI_USE_MMAP: "true"
      SHARPAI_USE_MLOCK: "false"
      SHARPAI_FLASH_ATTENTION: "false"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8000/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  #
  # SharpAI Dashboard
  # See https://hub.docker.com/r/jchristn77/sharpai-ui
  #
  sharpai-ui:
    container_name: 'sharpai-ui'
    image: 'jchristn77/sharpai-ui:v4.0.0'
    ports:
      - '3000:3000'
    depends_on:
      sharpai:
        condition: service_healthy
    restart: unless-stopped
