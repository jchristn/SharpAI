# For Apple Metal GPU acceleration, run SharpAI directly on macOS (not in Docker).
# Docker on Apple Silicon runs Linux containers which cannot access Metal.

services:

  #
  # SharpAI Server (CPU)
  # See https://hub.docker.com/r/jchristn77/sharpai
  # and https://github.com/jchristn/sharpai
  #
  sharpai:
    container_name: 'sharpai'
    image: 'jchristn77/sharpai:v4.0.1'
    ports:
      - '8000:8000'
    stdin_open: true
    tty: true
    volumes:
      - ./sharpai.json:/app/sharpai.json
      - ./sharpai.db:/app/sharpai.db
      - ./logs/:/app/logs/
      - sharpai-models:/app/models/
    environment:
      DOTNET_GC_SERVER: "1"
      SHARPAI_FORCE_BACKEND: "cpu"
      SHARPAI_CPU_VARIANT: "auto"
      SHARPAI_REQUIRE_BACKEND: "true"
      SHARPAI_ENABLE_NATIVE_LOGGING: "false"
      SHARPAI_NUM_THREADS: "0"
      SHARPAI_BATCH_THREADS: "0"
      SHARPAI_GPU_LAYERS: "auto"
      SHARPAI_MAIN_GPU: "0"
      SHARPAI_CONTEXT_SIZE: "0"
      SHARPAI_BATCH_SIZE: "0"
      SHARPAI_UBATCH_SIZE: "0"
      SHARPAI_USE_MMAP: "true"
      SHARPAI_USE_MLOCK: "false"
      SHARPAI_FLASH_ATTENTION: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8000/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  #
  # SharpAI Dashboard
  # See https://hub.docker.com/r/jchristn77/sharpai-ui
  #
  sharpai-ui:
    container_name: 'sharpai-ui'
    image: 'jchristn77/sharpai-ui:v4.0.1'
    ports:
      - '3000:3000'
    depends_on:
      sharpai:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sharpai-models:
